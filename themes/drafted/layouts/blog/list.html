{{ define "main" }}
  {{ $posts := .Pages.ByDate.Reverse }}
  {{ $featured := index $posts 0 }}
  {{ $rest := after 1 $posts }}

  <section class="section blog-overview-section">
    <div class="container blog-grid">
      {{ with $featured }}
        <article class="blog-feature">
          <div class="blog-feature-media">
            <a href="{{ .RelPermalink }}"><img src="{{ .Params.image | relURL }}" alt="{{ .Title }}"></a>
          </div>
          <div class="blog-feature-copy">
            <a href="{{ .RelPermalink }}"><h2>{{ .Title }}</h2></a>
            <p>{{ .Summary }}</p>
            <a class="text-link blog-cta" href="{{ .RelPermalink }}">Read More</a>
          </div>
        </article>
      {{ end }}

      <div class="blog-list">
        {{ range $rest }}
          <article class="card blog-card">
            <a class="blog-card-cover" href="{{ .RelPermalink }}"><img src="{{ .Params.image | relURL }}" alt="{{ .Title }}"></a>
            <div>
              <a href="{{ .RelPermalink }}"><h3>{{ .Title }}</h3></a>
              <p>{{ .Summary }}</p>
              <a class="text-link blog-cta" href="{{ .RelPermalink }}">Read More</a>
            </div>
          </article>
        {{ end }}
      </div>
    </div>
  </section>
{{ end }}
