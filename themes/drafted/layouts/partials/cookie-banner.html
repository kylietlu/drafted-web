<div class="cookie-banner" hidden>
  <p>This website uses cookies.</p>
  <div class="cookie-actions">
    <button type="button" class="btn cookie-settings">Settings</button>
    <button type="button" class="btn cookie-reject">Reject All</button>
    <button type="button" class="btn primary cookie-accept">Accept All</button>
  </div>
</div>

<div class="cookie-modal" hidden aria-hidden="true">
  <div class="cookie-modal-backdrop" data-cookie-modal-close></div>
  <div class="cookie-modal-card" role="dialog" aria-modal="true" aria-labelledby="cookie-modal-title">
    <h2 id="cookie-modal-title">Cookie Settings</h2>
    <p>We use cookies to improve user experience. Choose what cookie categories you allow us to use. You can read more about our Cookie Policy by clicking on Cookie Policy below.</p>

    <form class="cookie-settings-form">
      <label class="cookie-option">
        <input type="checkbox" checked disabled>
        <span>
          <strong>Essential (required)</strong>
          <small>These cookies enable strictly necessary cookies for security, language support and verification of identity. These cookies can’t be disabled.</small>
        </span>
      </label>

      <label class="cookie-option">
        <input type="checkbox" name="functionality" value="true">
        <span>
          <strong>Functionality</strong>
          <small>These cookies collect data to remember choices users make to improve and give a better user experience. Disabling can cause some parts of the site to not work properly.</small>
        </span>
      </label>

      <label class="cookie-option">
        <input type="checkbox" name="analytics" value="true">
        <span>
          <strong>Performance &amp; Analytics</strong>
          <small>These cookies help us to understand how visitors interact with our website, help us measure and analyze traffic to improve our service.</small>
        </span>
      </label>

      <label class="cookie-option">
        <input type="checkbox" name="targeting" value="true">
        <span>
          <strong>Targeting &amp; Advertising</strong>
          <small>These cookies help us to better deliver marketing content and customized ads.</small>
        </span>
      </label>

      <div class="cookie-modal-actions">
        <a class="btn cookie-policy-link" href="{{ "/legal/" | relURL }}">View Cookie Policy</a>
        <button type="submit" class="btn primary cookie-save">Save</button>
      </div>
    </form>
  </div>
</div>
