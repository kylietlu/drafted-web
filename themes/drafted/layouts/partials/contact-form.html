<form class="site-form" action="https://formspree.io/f/xrejazwq" method="POST" data-formspree>
  <input type="hidden" name="_subject" value="{{ .Site.Params.contactMailtoSubject }}">
  <input type="hidden" name="form_type" value="Contact form">
  <div class="form-grid">
    <label>
      <span>Name *</span>
      <input type="text" name="name" placeholder="J. Doe" required>
    </label>
    <label>
      <span>Company</span>
      <input type="text" name="company" placeholder="Company Inc.">
    </label>
    <label class="span-2">
      <span>Email *</span>
      <input type="email" name="email" placeholder="example@mail.com" required>
    </label>
    <label class="span-2">
      <span>Message *</span>
      <textarea name="message" placeholder="Hi Kylie! I'm reaching out because..." required></textarea>
    </label>
  </div>
  <p class="form-legal">By submitting this form, I agree to be contacted and for my data to be processed according to the privacy policy.</p>
  <p class="form-status" data-form-status aria-live="polite"></p>
  <button class="btn primary" type="submit">Submit</button>
</form>
