<form class="site-form inline-form" data-mailto="{{ .Site.Params.email }}" data-subject="{{ .Site.Params.newsletterMailtoSubject }}">
  <div class="form-grid single">
    <label class="span-2">
      <span>Email address *</span>
      <input type="email" name="email" placeholder="example@mail.com" required>
    </label>
  </div>
  <p class="form-legal">By submitting this form, I agree to be contacted and for my data to be processed according to the privacy policy.</p>
  <button class="btn primary" type="submit">Submit</button>
</form>
